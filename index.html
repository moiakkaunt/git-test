<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- Кодировка символов (поддержка кириллицы и эмодзи) -->
    <meta charset="UTF-8">
    
    <!-- Настройка для корректного отображения на мобильных устройствах (адаптивность) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Заголовок вкладки в браузере -->
    <title>Моя первая страница</title>
    
    <!-- Подключение внешнего файла со стилями (CSS) -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Можно добавить иконку сайта (favicon) -->
    <!-- <link rel="icon" href="favicon.ico" type="image/x-icon"> -->
</head>
<body>

    <!-- Шапка сайта (логотип, навигация) -->
    <header>
        <h1>Добро пожаловать на мой сайт</h1>
        <nav>
            <ul>
                <li><a href="#home">Главная</a></li>
                <li><a href="#about">О нас</a></li>
                <li><a href="#contact">Контакты</a></li>
            </ul>
        </nav>
    </header>

    <!-- Основное содержимое страницы -->
    <main>
        <section id="home">
            <h2>Главный раздел</h2>
            <p>Это стандартный абзац текста. Здесь может быть любая информация.</p>
            <button id="click-me-btn">Нажми меня</button>
        </section>

        <section id="about">
            <h2>О нас</h2>
            <p>Здесь описание проекта или компании.</p>
        </section>
    </main>

    <!-- Подвал сайта (копирайт, ссылки на соцсети) -->
    <footer>
        <p>&copy; 2026 Моя Компания. Все права защищены.</p>
    </footer>

    <!-- Подключение внешнего файла со скриптами (JavaScript) -->
    <!-- Размещается в конце body, чтобы не блокировать загрузку страницы -->
    <script src="script.js"></script>
</body>
</html>
